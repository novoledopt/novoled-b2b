# ─────────────────────────────────────────────────────────────────
#  NOVOLed — автоматическое обновление каталога
#  Запускается: каждые 2 часа автоматически + вручную через Actions
#
#  Что делает: коммитит пустой файл .last-sync с временной меткой,
#  что триггерит Vercel на пересборку и очищает CDN-кэш.
#  Сами данные хранятся в Google Таблице и читаются через Apps Script.
# ─────────────────────────────────────────────────────────────────
name: Auto Refresh Catalog

on:
  schedule:
    - cron: '0 */2 * * *'   # каждые 2 часа
  workflow_dispatch:          # ручной запуск из GitHub Actions

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump sync timestamp
        run: |
          echo "Last sync: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .last-sync
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-sync
          git diff --staged --quiet || git commit -m "chore: catalog refresh $(date -u '+%Y-%m-%d %H:%M')"
          git push
