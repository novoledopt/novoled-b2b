# ─────────────────────────────────────────────────────────────────
#  NOVOLed — автосинхронизация Google Таблицы → Supabase
#  Запускается: автоматически 2 раза в сутки (8:00 и 20:00 UTC)
#              + вручную через Actions → Run workflow
# ─────────────────────────────────────────────────────────────────
name: Sync Products

on:
  schedule:
    - cron: '0 8 * * *'    # 08:00 UTC (11:00 Киев летом)
    - cron: '0 20 * * *'   # 20:00 UTC (23:00 Киев летом)
  workflow_dispatch:        # ручной запуск из интерфейса GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SHEET_URL: ${{ secrets.SHEET_URL }}
        run: node js/sync-server.js
