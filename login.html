<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Вход · НОВОЛЕД</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/auth.js"></script>
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .login-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-soft);
      position: relative;
    }
    .login-logo {
      display: block;
      margin-bottom: 28px;
      text-decoration: none;
    }
    .login-logo-img {
      height: 32px;
      width: auto;
      display: block;
    }
    .login-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 6px;
      color: var(--text);
    }
    .login-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin: 0 0 28px;
    }
    .login-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .login-field label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .login-field input {
      background: var(--bg-soft);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      padding: 10px 14px;
      outline: none;
      transition: border-color var(--transition-fast);
      width: 100%;
    }
    .login-field input:focus {
      border-color: var(--accent);
    }
    .login-btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
    }
    .login-error {
      background: rgba(255, 92, 92, 0.1);
      border: 1px solid rgba(255, 92, 92, 0.3);
      border-radius: var(--radius-sm);
      color: var(--danger);
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 12px;
      display: none;
    }
    .login-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .login-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: var(--text-muted);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.18s, color 0.18s, background 0.18s;
      text-decoration: none;
    }
    .login-close:hover {
      border-color: rgba(255,255,255,0.3);
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }
    .login-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 14px;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <a href="index.html" class="login-close" title="На главную" aria-label="Закрыть">&#x2715;</a>
      <a href="index.html" class="login-logo">
        <img src="images/logo.svg" alt="NOVOLed" class="login-logo-img" />
      </a>
      <h1 class="login-title">Вход в каталог</h1>
      <p class="login-subtitle">Введите email, зарегистрированный менеджером</p>

      <div class="login-field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="shop@example.com" autocomplete="email" required />
      </div>

      <button class="btn-primary login-btn" id="login-btn" type="button">
        <span id="login-btn-text">Войти</span>
        <span class="login-spinner" id="login-spinner"></span>
      </button>

      <div class="login-error" id="login-error"></div>
      <p class="login-hint">Нет доступа? Обратитесь к менеджеру:<br>
        <a href="mailto:novoledopt@gmail.com" style="color:var(--accent)">novoledopt@gmail.com</a>
      </p>
    </div>
  </div>

  <script>
    // Если уже авторизован — сразу на каталог
    ;(function() {
      const user = getCurrentUser()
      if (user) window.location.href = 'index.html'
    })()

    const btn     = document.getElementById('login-btn')
    const btnText = document.getElementById('login-btn-text')
    const spinner = document.getElementById('login-spinner')
    const errorEl = document.getElementById('login-error')

    function setLoading(on) {
      btn.disabled = on
      btnText.style.display = on ? 'none' : ''
      spinner.style.display = on ? 'block' : 'none'
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim()
      errorEl.style.display = 'none'

      if (!email) {
        errorEl.textContent = 'Введите email'
        errorEl.style.display = 'block'
        return
      }

      setLoading(true)
      const result = await login(email)
      setLoading(false)

      if (result.success) {
        window.location.href = 'index.html'
      } else {
        errorEl.textContent = result.message
        errorEl.style.display = 'block'
      }
    }

    btn.addEventListener('click', doLogin)
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin()
    })
  </script>
</body>
</html>
